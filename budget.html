<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0d0f1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Бюджет"/>
<title>Мой Бюджет</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0d0f1a;--card:#141624;--card2:#1a1d2e;--border:#1e2235;
    --text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;
    --accent:#6366f1;--green:#10b981;--red:#ef4444;
    --yellow:#f59e0b;--purple:#8b5cf6;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
  #app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

  /* SCREENS */
  .screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px;display:none;}
  .screen.active{display:block;}
  .screen::-webkit-scrollbar{display:none;}

  /* NAV */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1;padding:10px 4px 8px;border:none;background:none;color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s;}
  nav button span.ico{font-size:20px;line-height:1;}
  nav button.on{color:var(--accent);}

  /* HEADER */
  .hdr{background:linear-gradient(160deg,#141830,var(--card2));padding:20px 16px 16px;padding-top:calc(20px + env(safe-area-inset-top));}
  .hdr-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
  .hdr-balance{font-size:36px;font-weight:800;letter-spacing:-1px;}
  .hdr-balance.pos{color:var(--green);}
  .hdr-balance.neg{color:var(--red);}
  .hdr-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .hdr-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
  .hdr-card-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .hdr-card-val{font-size:17px;font-weight:700;}

  /* CARDS */
  .section{padding:16px 16px 0;}
  .section-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}

  /* ROWS */
  .row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row-left{display:flex;align-items:center;gap:10px;}
  .row-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .row-name{font-size:14px;color:var(--text);}
  .row-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .row-amt{font-size:15px;font-weight:600;}

  /* PROGRESS BAR */
  .pbar-wrap{background:var(--border);border-radius:6px;height:5px;margin-top:5px;}
  .pbar{height:5px;border-radius:6px;transition:width .5s;}

  /* FORM */
  .type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
  .type-btn{padding:12px;border:1.5px solid var(--border);border-radius:12px;background:none;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
  .type-btn.on-exp{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red);}
  .type-btn.on-inc{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green);}
  .inp-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
  .inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;}
  .inp:focus{border-color:var(--accent);}
  .inp-wrap{margin-bottom:14px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:none;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .chip.on{border-color:var(--accent);background:rgba(99,102,241,.15);color:var(--accent);}
  .submit-btn{width:100%;padding:15px;border-radius:14px;border:none;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;letter-spacing:.3px;}
  .submit-exp{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fff;}
  .submit-inc{background:linear-gradient(135deg,#064e3b,#065f46);color:#fff;}

  /* WEDDING */
  .wedding-hero{background:linear-gradient(135deg,#1e1b4b,#2d1f6e);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;border:1px solid rgba(139,92,246,.2);}
  .wedding-emoji{font-size:44px;margin-bottom:10px;}
  .wedding-amt{font-size:34px;font-weight:800;color:#a5b4fc;letter-spacing:-1px;}
  .wedding-goal{color:var(--muted);font-size:13px;margin:4px 0 16px;}
  .wedding-pbar{background:rgba(0,0,0,.3);border-radius:8px;height:10px;margin-bottom:8px;}
  .wedding-pbar-fill{height:10px;border-radius:8px;background:linear-gradient(90deg,#818cf8,#a78bfa);transition:width .6s;}
  .wedding-pct{font-size:12px;color:#818cf8;font-weight:600;}
  .wedding-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .w-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .w-card-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .w-card-val{font-size:20px;font-weight:800;}
  .w-add-row{display:flex;gap:8px;}
  .w-add-btn{padding:13px 20px;background:linear-gradient(135deg,#4338ca,#6d28d9);color:#fff;border:none;border-radius:12px;font-size:20px;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0;}

  /* HISTORY */
  .hist-entry{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
  .hist-entry:last-child{border-bottom:none;}
  .hist-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .hist-info{flex:1;min-width:0;}
  .hist-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hist-date{font-size:11px;color:var(--muted);margin-top:2px;}
  .hist-right{text-align:right;flex-shrink:0;}
  .hist-amt{font-size:15px;font-weight:700;}
  .del-btn{font-size:10px;color:var(--muted2);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}

  /* TOAST */
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e2235;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  /* MONTH MONTH */
  .month-label{font-size:13px;color:var(--muted);font-weight:500;}

  select.inp{-webkit-appearance:none;appearance:none;}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="hdr">
      <div class="hdr-label" id="month-label"></div>
      <div class="hdr-balance" id="balance-val">0 с</div>
      <div class="hdr-row">
        <div class="hdr-card">
          <div class="hdr-card-label">Доход</div>
          <div class="hdr-card-val" id="income-val" style="color:#10b981">0 с</div>
        </div>
        <div class="hdr-card">
          <div class="hdr-card-label">Расходы</div>
          <div class="hdr-card-val" id="exp-val" style="color:#ef4444">0 с</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Обязательные расходы</div>
      <div class="card" id="fixed-list"></div>
    </div>

    <div class="section">
      <div class="section-title">Переменные расходы</div>
      <div class="card" id="var-list"><div style="color:var(--muted);font-size:13px;padding:8px 0;text-align:center">Пусто — внеси расходы</div></div>
    </div>

    <div class="section" style="padding-bottom:16px;">
      <div class="card" style="background:linear-gradient(135deg,#1a1740,#1e1b4b);border-color:rgba(139,92,246,.2);cursor:pointer;" onclick="goTab('wedding')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:13px;color:#a5b4fc;font-weight:600;">💍 Накопления на свадьбу</span>
          <span style="font-size:13px;font-weight:700;color:#a5b4fc;" id="w-summary">0 / 150 000 с</span>
        </div>
        <div style="background:rgba(0,0,0,.3);border-radius:6px;height:8px;">
          <div id="w-mini-bar" style="height:8px;border-radius:6px;background:linear-gradient(90deg,#818cf8,#a78bfa);width:0%;transition:width .5s;"></div>
        </div>
        <div style="font-size:11px;color:#818cf8;margin-top:6px;" id="w-mini-info"></div>
      </div>
    </div>
  </div>

  <!-- ADD -->
  <div class="screen" id="s-add">
    <div style="padding:20px 16px 0;padding-top:calc(20px + env(safe-area-inset-top))">
      <div style="font-size:22px;font-weight:800;margin-bottom:16px;">Внести запись</div>

      <div class="type-row">
        <button class="type-btn on-exp" id="btn-exp" onclick="setType('expense')">💸 Расход</button>
        <button class="type-btn" id="btn-inc" onclick="setType('income')">💰 Доход</button>
      </div>

      <div class="inp-wrap">
        <label class="inp-label">Сумма (сом)</label>
        <input class="inp" type="number" inputmode="decimal" id="f-amount" placeholder="0"/>
      </div>

      <div class="inp-wrap">
        <label class="inp-label">Дата</label>
        <input class="inp" type="date" id="f-date"/>
      </div>

      <div class="inp-wrap" id="cat-wrap">
        <label class="inp-label">Категория</label>
        <div class="chips" id="cat-chips"></div>
      </div>

      <div class="inp-wrap" id="src-wrap" style="display:none">
        <label class="inp-label">Источник</label>
        <div class="chips" id="src-chips"></div>
      </div>

      <div class="inp-wrap">
        <label class="inp-label">Заметка</label>
        <input class="inp" type="text" id="f-note" placeholder="Необязательно"/>
      </div>

      <button class="submit-btn submit-exp" id="submit-btn" onclick="addEntry()">− Добавить расход</button>
    </div>
  </div>

  <!-- WEDDING -->
  <div class="screen" id="s-wedding">
    <div style="padding:20px 16px 0;padding-top:calc(20px + env(safe-area-inset-top))">
      <div style="font-size:22px;font-weight:800;margin-bottom:16px;">Свадьба 💍</div>

      <div class="wedding-hero">
        <div class="wedding-emoji">💍</div>
        <div class="wedding-amt" id="w-amt">0 с</div>
        <div class="wedding-goal">из 150 000 сом • Сентябрь 2026</div>
        <div class="wedding-pbar"><div class="wedding-pbar-fill" id="w-bar" style="width:0%"></div></div>
        <div class="wedding-pct" id="w-pct">0% накоплено</div>
      </div>

      <div class="wedding-grid">
        <div class="w-card">
          <div class="w-card-label">Осталось</div>
          <div class="w-card-val" style="color:#ef4444" id="w-left">150 000 с</div>
        </div>
        <div class="w-card">
          <div class="w-card-label">Нужно/мес</div>
          <div class="w-card-val" style="color:#f59e0b" id="w-per-mo">30 000 с</div>
        </div>
        <div class="w-card">
          <div class="w-card-label">Месяцев</div>
          <div class="w-card-val" style="color:#10b981">5</div>
        </div>
        <div class="w-card">
          <div class="w-card-label">Свадьба</div>
          <div class="w-card-val" style="color:#a5b4fc;font-size:16px;">Сен 2026</div>
        </div>
      </div>

      <div class="card">
        <label class="inp-label">Добавить в копилку</label>
        <div class="w-add-row">
          <input class="inp" type="number" inputmode="decimal" id="w-input" placeholder="Сумма в сом" style="flex:1"/>
          <button class="w-add-btn" onclick="addWedding()">＋</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="s-hist">
    <div style="padding:20px 16px 0;padding-top:calc(20px + env(safe-area-inset-top))">
      <div style="font-size:22px;font-weight:800;margin-bottom:16px;">История</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <button class="on" id="n-home" onclick="goTab('home')"><span class="ico">🏠</span>ОБЗОР</button>
    <button id="n-add" onclick="goTab('add')"><span class="ico">➕</span>ВНЕСТИ</button>
    <button id="n-wedding" onclick="goTab('wedding')"><span class="ico">💍</span>СВАДЬБА</button>
    <button id="n-hist" onclick="goTab('hist')"><span class="ico">📋</span>ИСТОРИЯ</button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
const FIXED = [
  {name:"Интернет",amount:850,icon:"📡"},
  {name:"Подписки",amount:3600,icon:"📱"},
  {name:"Кредиты",amount:3000,icon:"🏦"},
  {name:"Свет",amount:1000,icon:"💡"},
  {name:"Крем",amount:400,icon:"🧴"},
  {name:"Мыло/мойки",amount:2000,icon:"🧼"},
];
const FIXED_TOTAL = FIXED.reduce((s,e)=>s+e.amount,0);
const WEDDING_GOAL = 150000;
const MONTHS_LEFT = 5;

const CATS = [
  {name:"Питание",icon:"🍔"},{name:"Транспорт",icon:"🚌"},
  {name:"Развлечения",icon:"🎮"},{name:"Подарки",icon:"🎁"},
  {name:"Одежда",icon:"👕"},{name:"Свадьба",icon:"💍"},{name:"Прочее",icon:"📦"}
];
const SRCS = [
  {name:"Монтаж",icon:"🎬"},{name:"Фронтенд",icon:"💻"},{name:"Прочее",icon:"💵"}
];
const MONTHS_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let entries = ls("bgt2_entries",[]);
let weddingAmt = ls("bgt2_wedding",0);

let curType = "expense";
let selCat = "Питание";
let selSrc = "Монтаж";

function fmt(n){return Math.round(n).toLocaleString("ru");}
function todayStr(){return new Date().toISOString().slice(0,10);}
function monthKey(d){return d.slice(0,7);}
function curMonth(){return todayStr().slice(0,7);}
function fmtDate(d){const dt=new Date(d);return dt.getDate()+" "+MONTHS_RU[dt.getMonth()].slice(0,3);}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function goTab(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("on"));
  document.getElementById("s-"+name).classList.add("active");
  document.getElementById("n-"+name).classList.add("on");
  if(name==="home") renderHome();
  if(name==="wedding") renderWedding();
  if(name==="hist") renderHistory();
}

function setType(t){
  curType=t;
  const expBtn=document.getElementById("btn-exp");
  const incBtn=document.getElementById("btn-inc");
  const sub=document.getElementById("submit-btn");
  expBtn.className="type-btn"+(t==="expense"?" on-exp":"");
  incBtn.className="type-btn"+(t==="income"?" on-inc":"");
  sub.className="submit-btn "+(t==="expense"?"submit-exp":"submit-inc");
  sub.textContent=t==="expense"?"− Добавить расход":"+ Добавить доход";
  document.getElementById("cat-wrap").style.display=t==="expense"?"block":"none";
  document.getElementById("src-wrap").style.display=t==="income"?"block":"none";
}

function renderChips(){
  const cc=document.getElementById("cat-chips");
  cc.innerHTML=CATS.map(c=>`<button class="chip${selCat===c.name?" on":""}" onclick="selCat='${c.name}';renderChips()">${c.icon} ${c.name}</button>`).join("");
  const sc=document.getElementById("src-chips");
  sc.innerHTML=SRCS.map(s=>`<button class="chip${selSrc===s.name?" on":""}" onclick="selSrc='${s.name}';renderChips()">${s.icon} ${s.name}</button>`).join("");
}

function addEntry(){
  const amt=+document.getElementById("f-amount").value;
  if(!amt||amt<=0){showToast("Введи сумму");return;}
  const e={
    id:Date.now(),type:curType,amount:amt,
    category:curType==="expense"?selCat:null,
    source:curType==="income"?selSrc:null,
    note:document.getElementById("f-note").value,
    date:document.getElementById("f-date").value||todayStr()
  };
  entries=[e,...entries];
  lsSet("bgt2_entries",entries);
  document.getElementById("f-amount").value="";
  document.getElementById("f-note").value="";
  showToast(curType==="expense"?"Расход добавлен ✓":"Доход добавлен ✓");
}

function removeEntry(id){
  entries=entries.filter(e=>e.id!==id);
  lsSet("bgt2_entries",entries);
  renderHistory();
  showToast("Удалено");
}

function addWedding(){
  const v=+document.getElementById("w-input").value;
  if(!v||v<=0){showToast("Введи сумму");return;}
  weddingAmt+=v;
  lsSet("bgt2_wedding",weddingAmt);
  document.getElementById("w-input").value="";
  renderWedding();
  showToast("Добавлено в копилку 💍");
}

function renderHome(){
  const cm=curMonth();
  const me=entries.filter(e=>monthKey(e.date)===cm);
  const income=me.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const varExp=me.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  const total=varExp+FIXED_TOTAL;
  const bal=income-total;

  const now=new Date();
  document.getElementById("month-label").textContent=MONTHS_RU[now.getMonth()]+" "+now.getFullYear();
  const bEl=document.getElementById("balance-val");
  bEl.textContent=(bal>=0?"+":"")+fmt(bal)+" с";
  bEl.className="hdr-balance "+(bal>=0?"pos":"neg");
  document.getElementById("income-val").textContent=fmt(income)+" с";
  document.getElementById("exp-val").textContent=fmt(total)+" с";

  // Fixed
  document.getElementById("fixed-list").innerHTML=FIXED.map(f=>`
    <div class="row">
      <div class="row-left">
        <div class="row-ico" style="background:rgba(99,102,241,.1)">${f.icon}</div>
        <div class="row-name">${f.name}</div>
      </div>
      <div class="row-amt" style="color:#9ca3af">${fmt(f.amount)} с</div>
    </div>
  `).join("")+`<div class="row"><div class="row-left"><div style="font-size:13px;color:var(--muted)">Итого</div></div><div class="row-amt" style="color:var(--red)">${fmt(FIXED_TOTAL)} с</div></div>`;

  // Var
  const catTotals=CATS.map(c=>({...c,total:me.filter(e=>e.type==="expense"&&e.category===c.name).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.total>0);
  const vEl=document.getElementById("var-list");
  if(!catTotals.length){
    vEl.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:8px 0;text-align:center">Пусто — внеси расходы</div>`;
  } else {
    vEl.innerHTML=catTotals.map(c=>{
      const pct=Math.min((c.total/(income||1))*100,100);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
          <span>${c.icon} ${c.name}</span>
          <span style="font-weight:600">${fmt(c.total)} с</span>
        </div>
        <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:var(--accent)"></div></div>
      </div>`;
    }).join("");
  }

  // Wedding mini
  const pct=Math.min((weddingAmt/WEDDING_GOAL)*100,100);
  const needed=Math.max(0,WEDDING_GOAL-weddingAmt);
  const perMo=Math.ceil(needed/MONTHS_LEFT);
  document.getElementById("w-summary").textContent=fmt(weddingAmt)+" / 150 000 с";
  document.getElementById("w-mini-bar").style.width=pct+"%";
  document.getElementById("w-mini-info").textContent=`${pct.toFixed(1)}% · нужно ${fmt(perMo)} с/мес`;
}

function renderWedding(){
  const pct=Math.min((weddingAmt/WEDDING_GOAL)*100,100);
  const needed=Math.max(0,WEDDING_GOAL-weddingAmt);
  const perMo=Math.ceil(needed/MONTHS_LEFT);
  document.getElementById("w-amt").textContent=fmt(weddingAmt)+" с";
  document.getElementById("w-bar").style.width=pct+"%";
  document.getElementById("w-pct").textContent=pct.toFixed(1)+"% накоплено";
  document.getElementById("w-left").textContent=fmt(needed)+" с";
  document.getElementById("w-per-mo").textContent=fmt(perMo)+" с";
}

function renderHistory(){
  const el=document.getElementById("hist-list");
  if(!entries.length){el.innerHTML=`<div style="color:var(--muted);text-align:center;padding:60px 0;font-size:14px">Записей пока нет</div>`;return;}
  el.innerHTML=entries.slice(0,50).map(e=>{
    const label=e.category||e.source||"";
    const cat=CATS.find(c=>c.name===label)||SRCS.find(s=>s.name===label)||{icon:"💰"};
    const bg=e.type==="income"?"rgba(16,185,129,.12)":"rgba(239,68,68,.1)";
    return `<div class="hist-entry">
      <div class="hist-ico" style="background:${bg}">${cat.icon}</div>
      <div class="hist-info">
        <div class="hist-name">${label}${e.note?" · "+e.note:""}</div>
        <div class="hist-date">${fmtDate(e.date)}</div>
      </div>
      <div class="hist-right">
        <div class="hist-amt" style="color:${e.type==="income"?"var(--green)":"var(--red)"}">${e.type==="income"?"+":"−"}${fmt(e.amount)} с</div>
        <button class="del-btn" onclick="removeEntry(${e.id})">удалить</button>
      </div>
    </div>`;
  }).join("");
}

// Init
document.getElementById("f-date").value=todayStr();
renderChips();
renderHome();
renderWedding();
renderHistory();
</script>
</body>
</html>
